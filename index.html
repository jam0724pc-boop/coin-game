<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
<title>コインはこびゲーム</title>
<style>
/* =========================================================
   コインはこびゲーム  〜たいらにあるこう！〜
   11インチ iPad ランドスケープ用  /  外部画像なし・1ファイル完結
    ※ 先生が調整しやすいよう、主なパラメータは <script> 冒頭の CONFIG にまとめています
   ========================================================= */

:root{
  --gold-1:#fff7c0; --gold-2:#ffd83a; --gold-3:#f5a800; --gold-4:#b66f00;
  --green-1:#9bffa0; --green-2:#4cd14c; --green-3:#157a15;
  --font: "Hiragino Maru Gothic ProN","ヒラギノ丸ゴ ProN W4","M PLUS Rounded 1c","Rounded Mplus 1c","Yu Gothic","YuGothic",sans-serif;
}

*{ box-sizing:border-box; -webkit-tap-highlight-color:transparent; margin:0; padding:0; }
html,body{ height:100%; overflow:hidden; }
body{
  font-family:var(--font);
  -webkit-user-select:none; user-select:none;
  touch-action:manipulation;
  background:#5ec8ff;
  color:#3a2a00;
}

/* ===== 画面共通 ===== */
.screen{
  position:fixed; inset:0;
  display:flex; flex-direction:column; align-items:center; justify-content:center;
  overflow:hidden;
}
.hidden{ display:none !important; }

/* ===== そら〜くさ の背景 ===== */
.sky-bg{
  position:absolute; inset:0; z-index:0;
  background:
    linear-gradient(180deg,
      #2fc7ff 0%, #6dd6ff 25%, #b0eaff 45%,
      #d4f56f 52%, #95e636 60%, #60b71a 100%);
}
.sun{
  position:absolute; top:5%; right:8%; width:14vh; height:14vh; border-radius:50%;
  background:radial-gradient(circle at 40% 35%, #fff7c7, #ffe65a 55%, #ffcf2e 100%);
  box-shadow:0 0 40px 14px rgba(255,225,90,.7);
  z-index:1;
}
.cloud{
  position:absolute; background:#fff; border-radius:50%;
  box-shadow:0 8px 18px rgba(0,0,0,.08);
  opacity:.95; z-index:1;
}
.cloud::before,.cloud::after{ content:""; position:absolute; background:#fff; border-radius:50%; }
.c1{ width:16vh; height:7vh; top:12%; left:10%; animation:drift 26s linear infinite; }
.c1::before{ width:9vh; height:9vh; top:-3.5vh; left:2.5vh; }
.c1::after{ width:7vh; height:7vh; top:-2.5vh; left:8vh; }
.c2{ width:12vh; height:5.5vh; top:24%; left:60%; animation:drift 34s linear infinite; }
.c2::before{ width:7vh; height:7vh; top:-3vh; left:2vh; }
.c2::after{ width:5.5vh; height:5.5vh; top:-2vh; left:6vh; }
@keyframes drift{ from{ transform:translateX(-10vw);} to{ transform:translateX(120vw);} }

/* 左右の土管（どかん） */
.pipe{
  position:absolute; bottom:0; width:13vh; height:30vh; z-index:2;
  background:linear-gradient(90deg,#0e5e0e 0%, #2f9e2f 22%, #b6ffba 46%, #3aa83a 64%, #0c4f0c 100%);
  border-radius:6px 6px 0 0;
  box-shadow:inset 0 0 0 .35vh rgba(10,50,10,.55);
}
.pipe::before{ /* 土管のフチ */
  content:""; position:absolute; top:-3.6vh; left:-1.4vh; width:calc(100% + 2.8vh); height:5.4vh;
  background:linear-gradient(90deg,#0e5e0e 0%, #2f9e2f 22%, #b6ffba 46%, #3aa83a 64%, #0c4f0c 100%);
  border-radius:10px;
  box-shadow:0 6px 12px rgba(0,0,0,.25), inset 0 -4px 6px rgba(0,0,0,.25), inset 0 4px 4px rgba(255,255,255,.4);
}
.pipe.left{ left:3vh; }
.pipe.right{ right:3vh; }

/* ===== タイトル文字 ===== */
.title-wrap{ position:relative; z-index:5; text-align:center; }
.game-title{
  font-size:9.2vh; line-height:1; font-weight:900; letter-spacing:.02em;
  transform:rotate(-2deg);
  animation:titlePop .6s cubic-bezier(.2,1.8,.4,1) both, logoGlow 2.6s .7s ease-in-out infinite alternate;
}
.game-title span{
  display:inline-block;
  text-shadow:
    0.48vh 0 0 #111, -0.48vh 0 0 #111, 0 0.48vh 0 #111, 0 -0.48vh 0 #111,
    0.48vh 0.48vh 0 #111, -0.48vh -0.48vh 0 #111, 0.48vh -0.48vh 0 #111, -0.48vh 0.48vh 0 #111,
    0 0.7vh 0 #111, 0 0.95vh 0 #111, 0 1.3vh .5vh rgba(0,0,0,.45);
}
.game-sub{
  display:inline-block; margin-top:2vh; font-size:3.4vh; font-weight:800;
  color:#fff; background:linear-gradient(180deg,#ff8aa0,#ff4d77);
  padding:1vh 3vh; border-radius:999px;
  -webkit-text-stroke:0; box-shadow:0 .8vh 0 #b62b50, 0 1.4vh 1.4vh rgba(0,0,0,.25);
  border:.5vh solid #fff;
}
@keyframes titlePop{ from{ transform:rotate(-2deg) scale(.4); opacity:0;} to{ transform:rotate(-2deg) scale(1); opacity:1;} }

/* あそびかたカード */
.howto{
  position:relative; z-index:5; margin-top:2.4vh;
  background:rgba(255,255,255,.92);
  border:.5vh solid #fff;
  border-radius:3vh; padding:1.6vh 3vh;
  box-shadow:0 1vh 2.4vh rgba(0,0,0,.2);
  display:flex; gap:3vh; align-items:center;
}
.howto .step{ text-align:center; max-width:20vh; }
.howto .emo{ font-size:5vh; line-height:1; }
.howto .lbl{ font-size:2.1vh; font-weight:800; color:#3a6a1a; margin-top:.6vh; }
.howto .arrow{ font-size:4vh; color:#ffb01f; font-weight:900; }

/* むずかしさボタン */
.levels-title{
  position:relative; z-index:5; margin-top:2.8vh; font-size:3.4vh; font-weight:900; color:#fff;
  text-shadow:
    0.3vh 0 0 #1a6a1a, -0.3vh 0 0 #1a6a1a, 0 0.3vh 0 #1a6a1a, 0 -0.3vh 0 #1a6a1a,
    0.3vh 0.3vh 0 #1a6a1a, -0.3vh -0.3vh 0 #1a6a1a,
    0 .9vh 1vh rgba(0,0,0,.3);
}
.levels{ position:relative; z-index:5; margin-top:1.4vh; display:flex; gap:2.2vh; flex-wrap:wrap; justify-content:center; }
.lv-btn{
  font-family:var(--font); cursor:pointer;
  width:18vh; min-height:15vh; padding:2vh .6vh; border-radius:3vh; border:.8vh solid #fff;
  color:#fff; font-weight:900; text-align:center;
  display:flex; flex-direction:column; align-items:center; justify-content:center;
  background-clip:padding-box;
  box-shadow:
    0 1.4vh 0 var(--sh,#888),
    0 2.2vh 2.6vh rgba(0,0,0,.35),
    inset 0 .8vh .8vh rgba(255,255,255,.65),
    inset 0 -.4vh .4vh rgba(0,0,0,.15);
  transition:transform .08s ease, box-shadow .08s ease, filter .1s ease;
  text-shadow:0 .4vh .6vh rgba(0,0,0,.35);
  filter:brightness(1) saturate(1.15);
}
.lv-btn .num{ font-size:5.4vh; line-height:1; display:block; font-weight:900; }
.lv-btn .nm{ font-size:2.7vh; line-height:1.15; display:block; margin-top:.6vh; }
.lv-btn .st{ font-size:3vh; line-height:1.1; display:block; margin-top:.6vh; }
.lv-btn:hover{ filter:brightness(1.1) saturate(1.2) drop-shadow(0 0 .8vh rgba(255,255,255,.4)); }
.lv-btn:active{ 
  transform:translateY(1.2vh); 
  box-shadow:0 .3vh 0 var(--sh,#888), 0 .8vh 1.2vh rgba(0,0,0,.28), inset 0 .8vh .8vh rgba(255,255,255,.6);
}
.lv1{ background:linear-gradient(180deg,#b8ff6e,#5fc22e); --sh:#2a6a14; }
.lv2{ background:linear-gradient(180deg,#a8f0ff,#2a9ae6); --sh:#0f5fa8; }
.lv3{ background:linear-gradient(180deg,#fff06e,#ffb01f); --sh:#b86a00; }
.lv4{ background:linear-gradient(180deg,#ffc06e,#ff6a1f); --sh:#b84000; }
.lv5{ background:linear-gradient(180deg,#ff9a9a,#e61a1a); --sh:#8a0a0a; }

.sound-note{ position:relative; z-index:5; margin-top:2vh; font-size:1.9vh; color:#2a5a10; font-weight:800; background:rgba(255,255,255,.7); padding:.6vh 1.6vh; border-radius:999px; }

.test-enter-btn{
  position:relative; z-index:5; margin-top:1.8vh; font-family:var(--font); cursor:pointer;
  font-size:2.6vh; font-weight:900; color:#fff;
  padding:1.4vh 3.4vh; border-radius:999px; border:.6vh solid #fff;
  background:linear-gradient(180deg,#c0a8ff,#8a5cf0);
  box-shadow:0 1.2vh 0 #5a2fb0, 0 1.8vh 2vh rgba(0,0,0,.28), inset 0 .6vh .6vh rgba(255,255,255,.6);
  text-shadow:0 .4vh .6vh rgba(0,0,0,.3); transition:transform .08s ease, box-shadow .08s ease;
}
.test-enter-btn:active{ transform:translateY(1vh); box-shadow:0 .2vh 0 #5a2fb0, 0 .6vh .8vh rgba(0,0,0,.28), inset 0 .6vh .6vh rgba(255,255,255,.6); }

/* モード切替（通常／てきあり） */
.mode-pick{ position:relative; z-index:5; margin-top:1.6vh; display:flex; align-items:center; gap:1.2vh; }
.mode-lbl{ font-size:2.2vh; font-weight:900; color:#fff; text-shadow:0 .4vh 0 #2a7a2a; }
.mode-btn{
  font-family:var(--font); cursor:pointer; font-size:2.4vh; font-weight:900; color:#7a7a7a;
  background:rgba(255,255,255,.9); border:.5vh solid #fff; border-radius:999px; padding:1vh 2.4vh;
  box-shadow:0 .8vh 1vh rgba(0,0,0,.18); transition:all .1s ease;
}
.mode-btn.on{ color:#fff; background:linear-gradient(180deg,#ff9a9a,#e63333); box-shadow:0 .8vh 1vh rgba(0,0,0,.25), inset 0 .4vh .4vh rgba(255,255,255,.5); }
.mode-btn#modeNormal.on{ background:linear-gradient(180deg,#a6ee6a,#3fb320); }
.mode-btn:active{ transform:translateY(.4vh); }

/* かたむきテスト画面 */
.test-title{
  position:relative; z-index:5; font-size:5vh; font-weight:900; color:#fff;
  text-shadow:
    0.3vh 0 0 #5a2fb0, -0.3vh 0 0 #5a2fb0, 0 0.3vh 0 #5a2fb0, 0 -0.3vh 0 #5a2fb0,
    0.3vh 0.3vh 0 #5a2fb0, -0.3vh -0.3vh 0 #5a2fb0, 0 .9vh 1vh rgba(0,0,0,.3);
}
.test-guide{
  position:relative; z-index:5; margin-top:1.2vh; font-size:2.6vh; font-weight:800; color:#3a2a00;
  background:rgba(255,255,255,.92); padding:1.2vh 2.6vh; border-radius:2.4vh; text-align:center; line-height:1.5;
  border:.4vh solid #fff; box-shadow:0 .8vh 1.4vh rgba(0,0,0,.2);
}
.test-guide b{ color:#e63333; }
.tray.tray-test{ width:46vh !important; height:46vh !important; border-radius:7vh; }
.coin-test{ width:11vh; height:11vh; margin-left:-5.5vh; margin-top:-5.5vh; }
.coin-test .face{ font-size:5.4vh; }
.test-controls{ position:relative; z-index:5; margin-top:1.6vh; display:flex; gap:1.6vh; flex-wrap:wrap; justify-content:center; }
.tfix-btn{
  font-family:var(--font); cursor:pointer; font-size:1.8vh; font-weight:800; color:#777;
  background:rgba(255,255,255,.9); border:.3vh solid #fff; border-radius:999px; padding:.6vh 1.6vh;
  box-shadow:0 .5vh .8vh rgba(0,0,0,.18); transition:all .1s ease;
}
.tfix-btn.big{ font-size:2.4vh; padding:1.2vh 2.6vh; }
.tfix-btn.on{ background:linear-gradient(180deg,#ffe46a,#ffb01f); color:#fff; box-shadow:0 .5vh .8vh rgba(0,0,0,.25), inset 0 .3vh .3vh rgba(255,255,255,.6); }
.tfix-btn:active{ transform:translateY(.3vh); }
.test-reset-btn{
  font-family:var(--font); cursor:pointer; font-size:2.4vh; font-weight:800; color:#fff;
  background:linear-gradient(180deg,#9fdcff,#36a8e6); border:.3vh solid #fff; border-radius:999px; padding:1.2vh 2.6vh;
  box-shadow:0 .8vh 1vh rgba(0,0,0,.22), inset 0 .3vh .3vh rgba(255,255,255,.5); transition:transform .08s ease;
}
.test-reset-btn:active{ transform:translateY(.4vh); }
.test-ok-btn{
  position:relative; z-index:5; margin-top:2vh; font-family:var(--font); cursor:pointer;
  font-size:3.4vh; font-weight:900; color:#fff;
  padding:1.8vh 5vh; border-radius:999px; border:.7vh solid #fff;
  background:linear-gradient(180deg,#b8ff6e,#3fb320);
  box-shadow:0 1.4vh 0 #1a6a0a, 0 2vh 2.2vh rgba(0,0,0,.3), inset 0 .6vh .8vh rgba(255,255,255,.65);
  text-shadow:0 .4vh .6vh rgba(0,0,0,.3); transition:transform .08s ease, box-shadow .08s ease;
}
.test-ok-btn:active{ transform:translateY(1.4vh); box-shadow:0 .2vh 0 #1a6a0a, 0 .8vh 1vh rgba(0,0,0,.3), inset 0 .6vh .8vh rgba(255,255,255,.65); }
#test{ justify-content:center; gap:0.4vh; }

/* =========================================================
   ゲーム画面
   ========================================================= */
#game{ justify-content:center; }
.counter{
  position:absolute; top:2.4vh; left:2.4vh; z-index:20;
  background:rgba(255,255,255,.92); border:.5vh solid #fff; border-radius:2vh;
  padding:1vh 2.2vh; font-size:3vh; font-weight:800; color:#c77400;
  box-shadow:0 .8vh 1.4vh rgba(0,0,0,.22);
}
.counter b{ color:#e63333; font-size:3.6vh; }
.quit{
  position:absolute; top:2.4vh; right:2.4vh; z-index:20;
  background:rgba(255,255,255,.85); border:.5vh solid #fff; border-radius:2vh;
  padding:.9vh 1.8vh; font-size:2.2vh; font-weight:800; color:#777; cursor:pointer;
  box-shadow:0 .6vh 1vh rgba(0,0,0,.2);
}
.quit:active{ transform:translateY(.4vh); }

.hint{
  position:absolute; top:2.4vh; left:50%; transform:translateX(-50%); z-index:15;
  font-size:3.6vh; font-weight:900; color:#fff;
  background:rgba(255,138,40,.92); padding:.8vh 2.6vh; border-radius:999px; border:.4vh solid #fff;
  text-shadow:0 .4vh .6vh rgba(0,0,0,.4);
  box-shadow:0 .8vh 1.4vh rgba(0,0,0,.25);
}

/* おぼん（トレイ） */
.tray-area{ position:relative; z-index:10; display:flex; align-items:center; justify-content:center; }
.tray{
  position:relative;
  width:72vh; height:72vh; border-radius:11vh;
  background:
    radial-gradient(circle at 48% 35%, rgba(255,255,255,.72), rgba(255,255,255,0) 52%),
    radial-gradient(ellipse at 50% 50%, #fff8d0, #ffe8a0 35%, #e8b640 65%, #d4941a 100%);
  border:1.4vh solid #fff;
  box-shadow:
    0 2.4vh 3.6vh rgba(0,0,0,.38),
    inset 0 -2.4vh 3.6vh rgba(130,70,0,.42),
    inset 0 1.8vh 2.4vh rgba(255,255,255,.85),
    inset 0 0 2.2vh rgba(255,255,255,.45);
}
/* ===== ステージ別の背景（5つの別ワールド）===== */
/* プレイ中は バラリンを出さない */
#rosePlay{ display:none; }
/* プレイ中は 土管を出さない */
#game .pipe{ display:none; }
#game.bg1 .sky-bg{ background:linear-gradient(180deg,#2fc7ff 0%,#6dd6ff 25%,#b0eaff 45%,#d4f56f 52%,#95e636 60%,#60b71a 100%); }
#game.bg2 .sky-bg{ background:linear-gradient(180deg,#62cdff 0%,#9ee4ff 26%,#33a6e6 44%,#1f8ad6 58%,#f3dca0 61%,#e6c474 100%); }
#game.bg3 .sky-bg{ background:linear-gradient(180deg,#bfe2ff 0%,#dcecff 34%,#ffe2ef 66%,#ffd0e2 100%); }
#game.bg4 .sky-bg{ background:linear-gradient(180deg,#a6d8f2 0%,#cfeaff 42%,#eef7ff 60%,#ffffff 100%); }
#game.bg5 .sky-bg{ background:linear-gradient(180deg,#120514 0%,#380a18 28%,#6e0e12 48%,#c0300a 62%,#4a0a06 100%); }
/* 太陽・雲は ワールドに合わせて出し分け */
#game.bg3 .sun, #game.bg4 .sun, #game.bg5 .sun{ display:none; }
#game.bg3 .cloud, #game.bg4 .cloud, #game.bg5 .cloud{ display:none; }
#game.bg5 .pipe{ filter:brightness(.7) saturate(1.2); }
#game.bg5 .tray{ box-shadow:0 2.4vh 3.6vh rgba(0,0,0,.5), inset 0 -2.4vh 3.6vh rgba(130,70,0,.42), inset 0 1.8vh 2.4vh rgba(255,255,255,.85), 0 0 3vh rgba(255,60,0,.5); }

/* ===== 各ワールドの飾り（CSS）===== トレイの左右・下の見える所に配置 */
.world{ position:absolute; inset:0; z-index:1; pointer-events:none; display:none; }
#game.bg1 .w1, #game.bg2 .w2, #game.bg3 .w3, #game.bg4 .w4, #game.bg5 .w5{ display:block; }
/* マンガ風の輪郭線 */
.ol{ filter: drop-shadow(.42vh 0 0 #2b241c) drop-shadow(-.42vh 0 0 #2b241c) drop-shadow(0 .42vh 0 #2b241c) drop-shadow(0 -.42vh 0 #2b241c); }

/* --- W1 くさはら：丘＋お花 --- */
.w1 .hill{ position:absolute; border-radius:50% 50% 0 0 / 100% 100% 0 0; }
.w1 .h1{ left:-7vh; bottom:9vh; width:38vh; height:27vh; background:linear-gradient(160deg,#a8ee5c,#69bd28); }
.w1 .h2{ right:-9vh; bottom:7vh; width:44vh; height:31vh; background:linear-gradient(160deg,#92e146,#53a41e); }
.w1 .hill::after{ content:""; position:absolute; left:18%; top:14%; width:34%; height:26%; background:rgba(255,255,255,.3); border-radius:50%; }
.w1 .flower{ position:absolute; width:4.6vh; height:4.6vh; border-radius:50%; background:#ff7eb0;
  box-shadow:3.2vh 0 #ffd23a, -3.2vh 0 #ff7eb0, 0 3.2vh #6fd0ff, 0 0 0 .4vh #2b241c; }
.w1 .flower::after{ content:""; position:absolute; left:50%; top:50%; width:42%; height:42%; margin:-21% 0 0 -21%; background:#fff8c0; border-radius:50%; box-shadow:0 0 0 .3vh #ca8f00; }
.w1 .fl1{ left:11vh; bottom:14vh; } .w1 .fl2{ left:4vh; bottom:7vh; transform:scale(.8); }

/* --- W2 すなはま：ヤシ・波・ビーチボール --- */
.w2 .wave{ position:absolute; left:0; right:0; height:1.4vh; background:rgba(255,255,255,.7); border-radius:50%; }
.w2 .wv1{ top:46%; } .w2 .wv2{ top:50%; opacity:.5; } .w2 .wv3{ top:54%; opacity:.35; }
.w2 .palm{ position:absolute; left:4vh; bottom:8vh; width:24vh; height:42vh; }
.w2 .trunk{ position:absolute; bottom:0; left:6vh; width:3.6vh; height:30vh; background:linear-gradient(90deg,#7a4a22,#c89456 55%,#8a5a2e); border-radius:40%; transform:rotate(-6deg); transform-origin:bottom; }
.w2 .frond{ position:absolute; top:0; left:5vh; width:19vh; height:7vh; background:linear-gradient(#5cc83e,#2f8a24); border-radius:60% 60% 50% 50%; transform-origin:8% 50%; }
.w2 .f1{ transform:rotate(-22deg);} .w2 .f2{ transform:rotate(6deg);} .w2 .f3{ transform:rotate(34deg);} .w2 .f4{ transform:rotate(-50deg);} 
.w2 .coco{ position:absolute; top:5.5vh; left:5vh; width:3vh; height:3vh; border-radius:50%; background:radial-gradient(circle at 35% 30%,#8a5a2e,#4a2c12); }
.w2 .coco.c2{ left:8vh; top:6.5vh; } .w2 .coco.c3{ left:3vh; top:7vh; }
.w2 .ball{ position:absolute; right:36vh; bottom:5vh; width:11vh; height:11vh; border-radius:50%;
  background:conic-gradient(#ff5a5a 0 25%,#fff 0 50%,#ffd23a 0 75%,#5ab0ff 0); box-shadow:inset -1vh -1vh 1.4vh rgba(0,0,0,.25); }

/* --- W3 そら：ふわふわ雲＋浮島 --- */
.w3 .scloud{ position:absolute; height:11vh; background:#fff; border-radius:50%; box-shadow:0 1vh 1.6vh rgba(110,120,170,.14), inset 0 -1.4vh 1.4vh rgba(180,195,230,.4); }
.w3 .scloud::before{ content:""; position:absolute; width:55%; height:130%; left:8%; top:-44%; background:#fff; border-radius:50%; }
.w3 .scloud::after{ content:""; position:absolute; width:46%; height:118%; right:8%; top:-30%; background:#fff; border-radius:50%; }
.w3 .sc1{ left:2vh; top:16%; width:24vh; }
.w3 .sc2{ right:2vh; top:30%; width:28vh; }
.w3 .sc3{ left:1vh; top:64%; width:26vh; }
.w3 .island{ position:absolute; right:4vh; bottom:16vh; width:24vh; height:9vh; background:linear-gradient(#86d83e 42%,#7a4a28 42%); border-radius:50%; }
.w3 .island::after{ content:""; position:absolute; left:50%; bottom:-5vh; width:1vh; height:6vh; margin-left:-.5vh; background:#5a8a2a; }

/* --- W4 ゆきやま：雪山・ふる雪・雪だるま --- */
.w4 .mtn{ position:absolute; clip-path:polygon(50% 0,100% 100%,0 100%); background:linear-gradient(180deg,#ffffff 0 36%,#c9e2f2 36%); }
.w4 .m1{ left:-4vh; bottom:9vh; width:30vh; height:34vh; }
.w4 .m2{ right:-6vh; bottom:7vh; width:36vh; height:40vh; }
.w4 .snowman{ position:absolute; left:5vh; bottom:8vh; width:14vh; height:23vh; }
.w4 .snowman .sb{ position:absolute; left:50%; border-radius:50%; background:radial-gradient(circle at 40% 32%,#fff,#d6e6f2); }
.w4 .snowman .bot{ width:14vh; height:14vh; bottom:0; margin-left:-7vh; }
.w4 .snowman .top{ width:10vh; height:10vh; bottom:10vh; margin-left:-5vh; }

/* ===== クオリティUP：奥行き・光・動き ===== */
/* 画面全体のやわらかい光と影（ムード） */
#game::after{ content:""; position:absolute; inset:0; z-index:3; pointer-events:none;
  background:radial-gradient(ellipse at 50% 34%, rgba(255,255,255,.10), rgba(0,0,0,0) 48%, rgba(0,0,0,.16) 100%); }
/* 太陽がふんわり脈打つ */
.sun{ animation:sunPulse 4s ease-in-out infinite; }
@keyframes sunPulse{ 0%,100%{ box-shadow:0 0 40px 14px rgba(255,225,90,.6);} 50%{ box-shadow:0 0 58px 22px rgba(255,225,90,.85);} }
/* W1 奥の丘（うすい色で遠近感） */
.w1 .hillback{ position:absolute; bottom:18vh; border-radius:50% 50% 0 0 / 100% 100% 0 0; opacity:.7; }

@keyframes palmSway{ 0%,100%{ transform:rotate(-1.6deg);} 50%{ transform:rotate(1.6deg);} }
.w2 .wave{ animation:waveShim 4s ease-in-out infinite; }

/* W3 雲がゆっくり流れる */
.w3 .sc1{ animation:skyDrift 26s ease-in-out infinite; }
.w3 .sc2{ animation:skyDrift 34s ease-in-out infinite reverse; }
.w3 .sc3{ animation:skyDrift 30s ease-in-out infinite; }
@keyframes skyDrift{ 0%,100%{ transform:translateX(0);} 50%{ transform:translateX(5vh);} }
/* W4 奥の雪山（うすい色で遠近感） */

.w4 .mb2{ right:11vh; bottom:14vh; width:40vh; height:34vh; }

  background:radial-gradient(circle at 50% 72%, #fff3a0, #ff8a10 52%, #ff4a00 82%); box-shadow:0 0 3vh rgba(255,120,0,.95);
  animation:torchFlick .25s ease-in-out infinite alternate; }

@keyframes torchFlick{ from{ transform:scale(1) translateY(0); opacity:.9;} to{ transform:scale(1.14) translateY(-.4vh); opacity:1;} }
/* SVGで描いた飾りの配置 */
.wsvg{ position:absolute; pointer-events:none; }
.palmS{ left:2vh; bottom:8vh; width:26vh; height:37vh; transform-origin:60% 100%; animation:palmSway 4.5s ease-in-out infinite; }

/* コイン */
.coin{

    inset -1.2vh -1.2vh 0.6vh rgba(150,90,0,.5),

}

.coin .face{
  font-size:7vh; font-weight:900; color:#f6b500; position:relative; z-index:1;

}
.coin.win{ animation:coinWin .6s ease-in-out 3; }
@keyframes coinWin{ 0%,100%{ filter:brightness(1);} 50%{ filter:brightness(1.9) drop-shadow(0 0 3vh #ffe35a);} }
.coin.fall{ animation:coinFall .6s ease-in forwards; }
@keyframes coinFall{ to{ transform:translateY(60vh) rotate(540deg) scale(.5); opacity:0;} }

/* ゴールボタン（右下・先生用） */

/* =========================================================

   ========================================================= */
.rose{ position:relative; width:var(--s,12vh); height:var(--s,12vh);
  filter: drop-shadow(0 .6vh .5vh rgba(0,0,0,.3)); }
/* SVGバラリン：表示・表情きりかえ・おしゃべり */
.rose .esvg{ width:100%; height:100%; display:block; overflow:visible; }
.rose .rs-m{ display:none; }
.rose .rs-m-smile{ display:block; }
.rose .rs-eyearc{ display:none; }
.rose .sweat{ opacity:0; }

@keyframes rtalkS{ from{ transform:scaleY(.55);} to{ transform:scaleY(1.12);} }

/* ===== 演出強化（A:タイトル / B:結果 / C:コイン / D:敵） ===== */
@keyframes letterFloat{ 0%,100%{ transform:rotate(var(--rt,0deg)) translateY(0);} 50%{ transform:rotate(var(--rt,0deg)) translateY(-1vh);} }
@keyframes logoGlow{ from{ filter:drop-shadow(0 0 .5vh rgba(255,215,70,.2));} to{ filter:drop-shadow(0 0 2.2vh rgba(255,215,70,.7));} }
.enemy-parade{ position:absolute; right:-1vh; bottom:31vh; width:21vh; z-index:6; text-align:center; pointer-events:none; }
.ep-lbl{ display:inline-block; font-size:2vh; font-weight:900; color:#fff; background:rgba(40,20,60,.38); padding:.4vh 1.3vh; border-radius:2vh; margin-bottom:.7vh; text-shadow:0 .25vh .4vh rgba(0,0,0,.4); }
.ep-row{ display:flex; flex-direction:column-reverse; align-items:center; gap:.4vh; }
.bottom-row{ display:flex; align-items:center; justify-content:center; gap:2.4vh; flex-wrap:wrap; }
.rr-msg.stamp{ animation:stampIn .55s cubic-bezier(.2,1.5,.4,1) both; }
@keyframes stampIn{ 0%{ transform:scale(2.4) rotate(-14deg); opacity:0;} 55%{ transform:scale(.9) rotate(3deg); opacity:1;} 100%{ transform:scale(1) rotate(-2deg); opacity:1;} }
.bstar{ position:absolute; left:50%; top:44%; font-size:3vh; pointer-events:none; z-index:60; animation:burstFly .9s ease-out forwards; text-shadow:0 0 1.2vh rgba(255,210,60,.9); }
@keyframes burstFly{ from{ transform:translate(-50%,-50%) scale(.3) rotate(0deg); opacity:1;} to{ transform:translate(calc(-50% + var(--tx)), calc(-50% + var(--ty))) scale(1.1) rotate(240deg); opacity:0;} }
.coin{ overflow:hidden; }
.coin::before{ content:""; position:absolute; inset:-12%; border-radius:50%; pointer-events:none;
  background:linear-gradient(115deg, transparent 40%, rgba(255,255,255,.85) 50%, transparent 60%);
  transform:translateX(-140%); animation:coinSweep 2.8s ease-in-out infinite; z-index:2; }
@keyframes coinSweep{ 0%{ transform:translateX(-140%);} 55%{ transform:translateX(140%);} 100%{ transform:translateX(140%);} }
.tray::before{ content:""; position:absolute; inset:2.2vh; border-radius:9vh; pointer-events:none;
  background:repeating-radial-gradient(circle at 50% 50%, rgba(170,110,15,.08) 0 2.4vh, transparent 2.4vh 4.8vh); }
.traildot{ position:absolute; left:50%; top:50%; width:2.4vh; height:2.4vh; margin:-1.2vh 0 0 -1.2vh; border-radius:50%; pointer-events:none; z-index:10;
  background:radial-gradient(circle, rgba(255,235,130,.85), rgba(255,200,40,0) 72%); animation:trailFade .55s ease-out forwards; }
@keyframes trailFade{ to{ opacity:0; } }
@keyframes enemyIn{ 0%{ opacity:0; transform:translateY(-26vh) scale(.7);} 60%{ opacity:1; transform:translateY(1.6vh) scale(1.06);} 80%{ transform:translateY(-1vh) scale(.98);} 100%{ opacity:1; transform:none;} }
.enemy-char.windup{ animation:eWindup .5s ease-in both; }
@keyframes eWindup{ 0%{ transform:none;} 45%{ transform:scaleY(.8) scaleX(1.14) translateY(2.2vh);} 75%{ transform:scaleY(.8) scaleX(1.14) translateY(2.2vh) rotate(2deg);} 100%{ transform:none;} }
#game.shakeS{ animation:gshake .3s linear; }
@keyframes gshake{ 0%,100%{ transform:none;} 25%{ transform:translate(.45vh,-.3vh);} 50%{ transform:translate(-.45vh,.3vh);} 75%{ transform:translate(.3vh,.18vh);} }
.rose .bloom{ position:absolute; inset:0; animation:roseBob 2.6s ease-in-out infinite; }
@keyframes roseBob{ 0%,100%{ transform:translateY(0) rotate(-1.5deg);} 50%{ transform:translateY(-7%) rotate(1.5deg);} }
.rose .petal{
  position:absolute; left:50%; top:50%; width:40%; height:56%; margin:-28% 0 0 -20%;
  background:radial-gradient(circle at 36% 26%, #ff9ab0, #e0173f 60%, #9e0b29 100%);
  border-radius:50% 50% 50% 50% / 66% 66% 34% 34%;
  box-shadow:inset 0 -.5vh .7vh rgba(0,0,0,.18);
}
.rose .core{
  position:absolute; left:50%; top:50%; width:58%; height:58%; margin:-29% 0 0 -29%; z-index:2;
  border-radius:50%;
  background:radial-gradient(circle at 40% 34%, #ffd6df, #ff7d97 50%, #c11030 100%);
  box-shadow:inset 0 -.7vh .9vh rgba(120,0,20,.4), inset 0 .6vh .7vh rgba(255,255,255,.6);
}
.rose .face{ position:absolute; left:50%; top:50%; width:58%; height:58%; margin:-29% 0 0 -29%; z-index:3; }
.rose .eye{ position:absolute; top:30%; width:19%; height:25%; background:#3a1020; border-radius:50%; }
.rose .eye.l{ left:22%; } .rose .eye.r{ right:22%; }
.rose .eye::after{ content:""; position:absolute; top:14%; left:20%; width:42%; height:42%; background:#fff; border-radius:50%; }
.rose .cheek{ position:absolute; top:54%; width:17%; height:12%; background:rgba(255,120,150,.65); border-radius:50%; }
.rose .cheek.l{ left:12%; } .rose .cheek.r{ right:12%; }
.rose .mouth{ position:absolute; left:50%; top:62%; width:26%; height:15%; margin-left:-13%; border-bottom:.5vh solid #3a1020; border-radius:0 0 70% 70%; }
.rose .sweat{ position:absolute; top:20%; right:2%; width:11%; height:15%; background:linear-gradient(#bfe9ff,#4fb0ee); border-radius:50% 50% 50% 50% / 64% 64% 36% 36%; opacity:0; }
/* 葉っぱの手 */
.rose .rose-arm{ position:absolute; top:46%; width:30%; height:15%; background:linear-gradient(#86e85a,#36a83a); border-radius:50% 50% 50% 50% / 70% 70% 30% 30%; z-index:1; box-shadow:inset 0 -.3vh .4vh rgba(0,0,0,.2); }
.rose .rose-arm.l{ left:-18%; transform-origin:right center; transform:rotate(22deg); }
.rose .rose-arm.r{ right:-18%; transform-origin:left center; transform:rotate(-22deg); }
/* 下の葉 */
.rose .leaf{ position:absolute; bottom:-8%; width:26%; height:17%; background:linear-gradient(#5fc22e,#2a8a1a); border-radius:50% 50% 50% 50% / 70% 70% 30% 30%; z-index:0; }
.rose .leaf.l{ left:22%; transform:rotate(34deg); } .rose .leaf.r{ right:22%; transform:rotate(-34deg); }

/* 表情：しんぱい（あせ💦） */
.rose.worry .mouth{ width:15%; height:15%; margin-left:-7.5%; border:.4vh solid #3a1020; border-radius:50%; top:60%; }
.rose.worry .sweat{ opacity:1; animation:sweat .7s ease-in infinite; }
@keyframes sweat{ 0%{ transform:translateY(0); opacity:0;} 30%{opacity:1;} 100%{ transform:translateY(60%); opacity:0;} }
/* 表情：おおよろこび */
.rose.cheer .mouth{ width:34%; height:20%; margin-left:-17%; background:#3a1020; border-bottom:none; border-radius:10% 10% 60% 60%; }
.rose.cheer .eye{ height:13%; background:transparent; border-radius:0 0 60% 60%; border-bottom:.6vh solid #3a1020; top:34%; }
.rose.cheer .eye::after{ display:none; }
/* 表情：かなしい（ドンマイ） */
.rose.sad .mouth{ top:68%; border-bottom:none; border-top:.5vh solid #3a1020; border-radius:70% 70% 0 0; }
.rose.sad .eye{ top:34%; }
.rose.sad .tear{ position:absolute; top:48%; left:24%; width:9%; height:13%; background:linear-gradient(#bfe9ff,#4fb0ee); border-radius:50% 50% 50% 50% / 64% 64% 36% 36%; }

/* 手をふる（タイトル） */
.rose.wave .rose-arm.r{ animation:rwave .55s ease-in-out infinite; }
@keyframes rwave{ 0%,100%{ transform:rotate(-22deg);} 50%{ transform:rotate(-62deg);} }
/* ぴょこんと登場 / よろこびジャンプ */
.rose.pop{ animation:rosePop .5s cubic-bezier(.2,1.7,.4,1) both; }
@keyframes rosePop{ from{ transform:translateY(40%) scale(.5); opacity:0;} to{ transform:translateY(0) scale(1); opacity:1;} }
.rose.jump .bloom{ animation:roseJump .5s ease; }
@keyframes roseJump{ 0%,100%{ transform:translateY(0);} 40%{ transform:translateY(-26%) scale(1.08);} }

/* 花びら（はなびら）まい散らし */
.petalbox{ position:absolute; inset:0; z-index:47; pointer-events:none; overflow:hidden; }
.petalbox i{
  position:absolute; top:-8vh; width:2.6vh; height:3vh;
  background:radial-gradient(circle at 38% 28%, #ffd9e2, #ff5d86 72%);
  border-radius:50% 0 50% 50%;
  animation:petalFall linear forwards;
}
@keyframes petalFall{
  0%{ transform:translateY(-10vh) translateX(0) rotate(0); opacity:1; }
  100%{ transform:translateY(120vh) translateX(8vh) rotate(560deg); opacity:.95; }
}

/* =========================================================
   敵マスコット（すべてCSS）＋ 視界をじゃまする攻撃
   ========================================================= */
.enemy{ position:relative; width:var(--s,13vh); height:var(--s,13vh);
  filter: drop-shadow(0 .7vh .6vh rgba(0,0,0,.32)); }
.enemy .m-body{ position:absolute; inset:0; animation:roseBob 2.2s ease-in-out infinite; }
.enemy .esvg{ width:100%; height:100%; display:block; overflow:visible; }
.enemy .esvg-eyes, .rose .esvg-eyes{ transform-box:fill-box; transform-origin:center; animation:eblink 4.2s infinite; }
@keyframes eblink{ 0%,93%,100%{ transform:scaleY(1);} 96%{ transform:scaleY(.12);} }
.enemy .esvg-flame{ transform-box:fill-box; transform-origin:50% 72%; animation:eflameP .4s ease-in-out infinite alternate; }
@keyframes eflameP{ from{ transform:scaleY(1) scaleX(1);} to{ transform:scaleY(1.16) scaleX(1.05);} }
.enemy .m-head{ position:absolute; left:9%; top:16%; width:82%; height:76%; border-radius:46% 46% 44% 44%; box-shadow:inset 0 -1.2vh 1.4vh rgba(0,0,0,.3), inset 0 .8vh .8vh rgba(255,255,255,.28); z-index:2; }
.enemy .e-eye{ position:absolute; width:15%; height:20%; background:#2a1830; border-radius:50%; top:40%; z-index:4; }
.enemy .e-eye.l{ left:29%; } .enemy .e-eye.r{ right:29%; }
.enemy .e-eye::after{ content:""; position:absolute; top:10%; left:16%; width:40%; height:40%; background:#fff; border-radius:50%; }
/* 口・きば */
.enemy .m-mouth{ position:absolute; left:50%; top:63%; width:30%; height:15%; margin-left:-15%; background:#5a1020; border-radius:14% 14% 50% 50%; z-index:3; overflow:hidden; }
.enemy .m-fang{ position:absolute; top:-1%; width:18%; height:60%; background:#fff; }
.enemy .m-fang.l{ left:14%; clip-path:polygon(0 0,100% 0,50% 100%); }
.enemy .m-fang.r{ right:14%; clip-path:polygon(0 0,100% 0,50% 100%); }
/* つの */
.enemy .m-horn{ position:absolute; top:-1%; width:15%; height:28%; background:linear-gradient(#fff,#e3dcc8); z-index:1; }
.enemy .m-horn.l{ left:17%; clip-path:polygon(0 100%,100% 100%,28% 0); }
.enemy .m-horn.r{ right:17%; clip-path:polygon(0 100%,100% 100%,72% 0); }
/* まゆ（おこり顔） */
.enemy .m-brow{ position:absolute; width:24%; height:6%; background:#2a1020; top:33%; z-index:5; border-radius:30%; }
.enemy .m-brow.l{ left:20%; transform:rotate(16deg); } .enemy .m-brow.r{ right:20%; transform:rotate(-16deg); }
/* せなかトゲ */
.enemy .m-spike{ position:absolute; top:8%; width:11%; height:15%; background:#eaeaea; clip-path:polygon(0 100%,100% 100%,50% 0); z-index:0; }
/* かんむり・ほのお（ボス用） */
.enemy .m-crown{ position:absolute; top:-13%; left:29%; width:42%; height:22%; background:linear-gradient(#ffe46a,#ffae00); clip-path:polygon(0 100%,16% 26%,34% 72%,50% 8%,66% 72%,84% 26%,100% 100%); z-index:6; filter:drop-shadow(0 .3vh .3vh rgba(0,0,0,.3)); }
.enemy .m-flame{ position:absolute; left:-8%; right:-8%; top:-16%; height:50%; background:radial-gradient(circle at 50% 75%, rgba(255,170,0,.9), rgba(255,70,0,.4) 55%, transparent 72%); border-radius:50%; z-index:0; animation:flameFlick .35s ease-in-out infinite alternate; }
@keyframes flameFlick{ from{ transform:scaleY(1) scaleX(1);} to{ transform:scaleY(1.18) scaleX(1.05);} }
/* つやつやハイライト（全員） */
.enemy .m-head::before{ content:""; position:absolute; left:16%; top:8%; width:46%; height:32%; background:radial-gradient(ellipse at 42% 38%, rgba(255,255,255,.6), rgba(255,255,255,0) 70%); border-radius:50%; z-index:3; pointer-events:none; }
.enemy .e-eye::after{ box-shadow:-0.3vh 0.3vh 0 rgba(255,255,255,.55); }
/* ほっぺ（やさしい子 b1・b2） */
.enemy.b1 .m-head::after, .enemy.b2 .m-head::after{ content:""; position:absolute; inset:0; border-radius:inherit; z-index:3; pointer-events:none; background:
  radial-gradient(circle at 21% 66%, rgba(255,120,150,.55) 4.5%, transparent 8.5%),
  radial-gradient(circle at 79% 66%, rgba(255,120,150,.55) 4.5%, transparent 8.5%); }

/* ===== レベル1：コロぽん（ちいさい・よわい・かわいい） ===== */
.enemy.b1 .m-head{ background:radial-gradient(circle at 38% 30%, #f3ddb0, #cda063 80%); }
.enemy.b1 .m-mouth{ width:16%; height:9%; margin-left:-8%; background:transparent; border-bottom:.5vh solid #6a4020; border-radius:0 0 60% 60%; top:64%; }
.enemy.b1 .e-eye{ width:17%; height:23%; }
/* ===== レベル2：ツノこぞう（ちいさいツノ・いたずら） ===== */
.enemy.b2 .m-head{ background:radial-gradient(circle at 38% 30%, #c2ee82, #6aa83a 80%); }
.enemy.b2 .m-horn{ height:22%; width:13%; }
.enemy.b2 .m-mouth{ width:24%; height:11%; margin-left:-12%; }
.enemy.b2 .m-fang{ height:50%; }
/* ===== レベル3：キバモン（オレンジ・キバ・トゲ） ===== */
.enemy.b3 .m-head{ background:radial-gradient(circle at 38% 30%, #ffb066, #df7a14 80%); }
.enemy.b3 .m-horn{ height:30%; width:15%; }
.enemy.b3 .m-spike.s1{ left:24%; } .enemy.b3 .m-spike.s2{ right:24%; }
/* ===== レベル4：オニドロ（あかぐろ・大きいツノ・おこり） ===== */
.enemy.b4 .m-head{ background:radial-gradient(circle at 38% 30%, #ec6a55, #a02216 82%); box-shadow:inset 0 -1.2vh 1.4vh rgba(0,0,0,.4), inset 0 .8vh .8vh rgba(255,255,255,.2); }
.enemy.b4 .m-horn{ height:38%; width:18%; background:linear-gradient(#fff,#c9c0aa); }
.enemy.b4 .m-mouth{ width:38%; height:20%; margin-left:-19%; top:60%; }
.enemy.b4 .m-fang{ height:55%; width:20%; }
.enemy.b4 .m-spike{ width:13%; height:18%; background:#d8d2c0; }
.enemy.b4 .m-spike.s1{ left:20%; } .enemy.b4 .m-spike.s2{ right:20%; } .enemy.b4 .m-spike.s3{ left:44.5%; top:3%; }
/* ===== レベル5：ラスボス（巨大・くろ・赤目・かんむり・ほのお） ===== */
.enemy.b5 .m-head{ background:radial-gradient(circle at 38% 28%, #6a5878, #281830 82%); box-shadow:inset 0 -1.4vh 1.6vh rgba(0,0,0,.55), 0 0 2.6vh rgba(255,40,40,.55); }
.enemy.b5 .e-eye{ background:#ff2a2a; box-shadow:0 0 1.6vh #ff2a2a; }
.enemy.b5 .e-eye::after{ background:#ffd0d0; top:18%; left:18%; width:50%; height:50%; }
.enemy.b5 .m-horn{ height:46%; width:22%; background:linear-gradient(#fff,#bdb39a); }
.enemy.b5 .m-horn.l{ left:9%; transform:rotate(-10deg); } .enemy.b5 .m-horn.r{ right:9%; transform:rotate(10deg); }
.enemy.b5 .m-mouth{ width:44%; height:24%; margin-left:-22%; top:58%; background:#3a0010; }
.enemy.b5 .m-fang{ height:58%; width:20%; }
.enemy.b5 .m-spike{ width:14%; height:20%; background:#b0e0e0; }
.enemy.b5 .m-spike.s1{ left:16%; } .enemy.b5 .m-spike.s2{ right:16%; } .enemy.b5 .m-spike.s3{ left:43%; top:1%; }

/* 敵キャラ（プレイ中ずっと 右の土管の上に いる） */
.enemy-char{ position:absolute; z-index:13; pointer-events:none; opacity:0; transition:opacity .3s ease; }
.enemy-char.in{ opacity:1; animation:enemyIn .75s cubic-bezier(.3,1.4,.4,1) both; }
.enemy-char.attacking{ animation:enemyLunge .55s ease; }
@keyframes enemyLunge{ 0%,100%{ transform:translateX(0) scale(1) rotate(0);} 35%{ transform:translateX(-4vh) scale(1.15) rotate(-5deg);} }

/* ===== 視界じゃま攻撃のレイヤー ===== */
.enemy-layer{ position:absolute; inset:0; z-index:12; pointer-events:none; overflow:hidden; }
/* くも */
.atk-cloud{ position:absolute; top:38%; left:-40vh; width:40vh; height:24vh; background:radial-gradient(circle at 50% 50%, rgba(255,255,255,.92), rgba(255,255,255,0) 70%); animation:atkCloud var(--d,2.6s) ease-in-out forwards; }
@keyframes atkCloud{ 0%{ transform:translateX(0);} 100%{ transform:translateX(140vh);} }
/* 葉っぱ/チョウ */
.atk-leaf{ position:absolute; width:5vh; height:5vh; left:-8vh; background:radial-gradient(circle at 40% 35%, #ffd36a, #ff8ad0 70%); border-radius:60% 60% 50% 50%; animation:atkLeaf var(--d,2.2s) linear forwards; }
@keyframes atkLeaf{ 0%{ transform:translateX(0) rotate(0);} 100%{ transform:translateX(125vh) rotate(540deg);} }
/* スミのシミ */
.atk-ink{ position:absolute; width:18vh; height:16vh; background:radial-gradient(circle at 45% 40%, rgba(60,20,90,.9), rgba(60,20,90,.7) 55%, rgba(60,20,90,0) 72%); border-radius:48% 52% 56% 44%/52% 48% 56% 44%; opacity:0; animation:atkInk var(--d,2.2s) ease-out forwards; }
@keyframes atkInk{ 0%{ opacity:0; transform:scale(.3);} 15%{ opacity:1; transform:scale(1.05);} 70%{ opacity:1;} 100%{ opacity:0; transform:scale(1.1);} }
/* けむり */
.atk-smoke{ position:absolute; width:26vh; height:26vh; background:radial-gradient(circle at 50% 50%, rgba(150,150,160,.7), rgba(150,150,160,0) 70%); border-radius:50%; opacity:0; animation:atkSmoke var(--d,2.4s) ease-out forwards; }
@keyframes atkSmoke{ 0%{ opacity:0; transform:scale(.4);} 25%{ opacity:.85; transform:scale(1);} 75%{ opacity:.8;} 100%{ opacity:0; transform:scale(1.3);} }
/* 暗闇（まんなかだけ見える） */
.atk-dark{ position:absolute; inset:0; opacity:0; background:radial-gradient(circle at 50% 52%, rgba(0,0,0,0) 12vh, rgba(10,0,30,.82) 30vh); animation:atkDark var(--d,2.8s) ease-in-out forwards; }
@keyframes atkDark{ 0%{ opacity:0;} 20%{ opacity:1;} 80%{ opacity:1;} 100%{ opacity:0;} }
.atk-mist{ position:absolute; top:30%; left:-50vh; width:50vh; height:40vh; background:radial-gradient(circle at 50% 50%, rgba(120,90,170,.5), rgba(120,90,170,0) 70%); animation:atkCloud var(--d,2.8s) linear forwards; }

/* たてむき注意 */
.rotate-hint{
  position:fixed; inset:0; z-index:999; display:none;
  flex-direction:column; align-items:center; justify-content:center; gap:3vh;
  background:linear-gradient(180deg,#36a8e6,#6abf26); color:#fff; text-align:center;
}
.rotate-hint .ico{ font-size:18vw; animation:rot 2s ease-in-out infinite; }
@keyframes rot{ 0%,100%{ transform:rotate(0);} 50%{ transform:rotate(90deg);} }
.rotate-hint .txt{ font-size:6vw; font-weight:800; text-shadow:0 .6vh 0 #2a7a2a; }
@media (orientation:portrait){ .rotate-hint{ display:flex; } }

/* バラリンの ふきだし */
.bubble{
  position:fixed; z-index:60; pointer-events:none;
  max-width:46vw; padding:1.2vh 2.4vh; border-radius:2.4vh;
  background:#fff; border:.6vh solid #ffd982; color:#3a2a00;
  font-family:var(--font); font-size:3vh; font-weight:900; text-align:center; line-height:1.3;
  box-shadow:0 1vh 1.8vh rgba(0,0,0,.28);
  opacity:0; transform:scale(.6); transform-origin:center bottom;
  transition:opacity .14s ease, transform .14s cubic-bezier(.2,1.7,.4,1);
}
.bubble.show{ opacity:1; transform:scale(1); }
.bubble::after{
  content:""; position:absolute; left:50%; bottom:-2vh; margin-left:-1.6vh;
  border:1.6vh solid transparent; border-top-color:#ffd982; border-bottom:0;
}
/* 口パク（しゃべっているとき） */
.rose.talking .mouth{ animation:rtalk .16s ease-in-out infinite alternate; }
@keyframes rtalk{ from{ transform:scaleY(.45);} to{ transform:scaleY(1.25);} }
</style>
</head>

  <div class="sun"></div>

  <div class="title-wrap">

  </div>

  <div class="howto">
    <div class="step"><div class="emo">🙌</div><div class="lbl">iPadを<br>りょうてで<br>もつよ</div></div>
    <div class="arrow">▶</div>

    <div class="arrow">▶</div>

  <div class="levels">
    <button class="lv-btn lv1" data-level="1"><span class="num">1</span><span class="nm">とっても<br>かんたん</span></button>
    <button class="lv-btn lv2" data-level="2"><span class="num">2</span><span class="nm">かんたん</span></button>
    <button class="lv-btn lv3" data-level="3"><span class="num">3</span><span class="nm">ふつう</span></button>
    <button class="lv-btn lv4" data-level="4"><span class="num">4</span><span class="nm">むずかしい</span></button>
    <button class="lv-btn lv5" data-level="5"><span class="num">5</span><span class="st">ゲキムズ</span></button>

<script>
/* =========================================================================
   ★ 先生むけ調整パラメータ ★
   むずかしさを変えたいときは、ここの数字をいじってください。
   - sens   : コインの すべりやすさ（大きいほど よく動く＝むずかしい）
   - damp   : ブレーキの強さ（1に近いほど止まりにくい＝慣性が大きい）
   - radius : おぼんのセーフ範囲のわりあい（小さいほど落ちやすい）
   ========================================================================= */
const CONFIG = {
  /* sens=かたむきへの敏感さ（大きいほど速く転がる） / damp=すべり（1に近いほど止まりにくい）
     ※「ふちから落ちるリアル設定」に合わせて再調整。radius は現在未使用 */
  1:{ sens:1600, damp:0.946, radius:0.90 },  // とってもかんたん
  2:{ sens:2700, damp:0.952, radius:0.84 },  // かんたん
  3:{ sens:4200, damp:0.958, radius:0.77 },  // ふつう
  4:{ sens:6300, damp:0.964, radius:0.69 },  // むずかしい
  5:{ sens:9500, damp:0.970, radius:0.61 }   // ゲキムズ
};
const TOTAL_PLAYS = 5;

/* しゃべり用（先に宣言しておく） */
let speakTimer=null, speakTarget=null;

/* ★ 傾きの向き調整 ★
   万が一、傾けた向きと コインの動きが逆だったら、
   下の true / false を入れかえてください。
   - invertX : 右に傾けたのに コインが左へ行く → true にする
   - invertY : 前(奥)に傾けたのに コインが手前へ来る → true にする  */
const TILT = { invertX:false, invertY:false };

/* ===================== ゲーム状態 ===================== */
const State = {
  level:1, play:1, clears:0,
  active:false, ended:false, calibrating:false,
  x:0, y:0, vx:0, vy:0,
  baseBeta:0, baseGamma:0,
  curBeta:0, curGamma:0,
  sensorSeen:false, pointerCtrl:false,
  raf:null, last:0, maxR:0,
  lastBeep:0,
  enemyMode:false, enemyTimer:null,
  // テストモード用
  testOn:false, tx:0, ty:0, tvx:0, tvy:0, testRaf:null, testLast:0, testMaxR:0
};

/* ===================== 画面のきりかえ ===================== */
const screens = { title:byId('title'), test:byId('test'), game:byId('game'), final:byId('final') };
function show(name){
  for(const k in screens) screens[k].classList.add('hidden');
  screens[name].classList.remove('hidden');
}
function byId(id){ return document.getElementById(id); }

/* =========================================================================
   Web Audio API  〜 すべての音をプログラムで生成 〜
   ========================================================================= */
let audioCtx=null, masterGain=null;
const NOTES = (function(){
  const m={}, names=['C','C#','D','D#','E','F','F#','G','G#','A','A#','B'];
  for(let oct=1; oct<=6; oct++){
    for(let i=0;i<12;i++){
      const midi=(oct+1)*12+i;            // C4 -> 60
      m[names[i]+oct]=440*Math.pow(2,(midi-69)/12);
    }
  }
  m['r']=0; return m;
})();

function initAudio(){
  if(audioCtx) return;
  const AC = window.AudioContext || window.webkitAudioContext;
  audioCtx = new AC();
  masterGain = audioCtx.createGain();
  masterGain.gain.value = 0.42;
  masterGain.connect(audioCtx.destination);
}
function resumeAudio(){ if(audioCtx && audioCtx.state==='suspended') audioCtx.resume(); }

/* 1音を鳴らす（square=メロディ / triangle=ベース） */
function playNote(type, freq, t, dur, gain){
  if(!freq) return;
  const osc=audioCtx.createOscillator(), g=audioCtx.createGain();
  osc.type = (type==='bass') ? 'triangle' : 'square';
  osc.frequency.setValueAtTime(freq, t);
  g.gain.setValueAtTime(0.0001, t);
  g.gain.linearRampToValueAtTime(gain, t+0.012);
  g.gain.exponentialRampToValueAtTime(0.0001, t+dur);
  osc.connect(g); g.connect(masterGain);
  osc.start(t); osc.stop(t+dur+0.03);
}
/* ノイズの ドラム（8bitっぽい打楽器） */
function playDrum(t){
  const len=Math.floor(audioCtx.sampleRate*0.05);
  const buf=audioCtx.createBuffer(1,len,audioCtx.sampleRate);
  const d=buf.getChannelData(0);
  for(let i=0;i<len;i++) d[i]=(Math.random()*2-1)*Math.pow(1-i/len,2);
  const src=audioCtx.createBufferSource(); src.buffer=buf;
  const f=audioCtx.createBiquadFilter(); f.type='highpass'; f.frequency.value=2600;
  const g=audioCtx.createGain(); g.gain.value=0.18;
  src.connect(f); f.connect(g); g.connect(masterGain); src.start(t);
}

/* ===================== 5曲のBGM（短いループ） ===================== */
/* note は ['音名', 拍数]。type:'drum' のトラックは ['x',拍] で打つ */
const BGMS = {
  1:{ tempo:104, tracks:[
    { type:'mel', gain:0.30, seq:[
      ['C5',1],['E5',1],['G5',1],['E5',1], ['F5',1],['E5',1],['D5',1],['r',1],
      ['D5',1],['F5',1],['A5',1],['F5',1], ['E5',1],['D5',1],['C5',2] ] },
    { type:'bass', gain:0.34, seq:[
      ['C3',2],['G3',2],['F3',2],['G3',2], ['F3',2],['C3',2],['G3',2],['C3',2] ] }
  ]},
  2:{ tempo:126, tracks:[
    { type:'mel', gain:0.30, seq:[
      ['G4',.5],['B4',.5],['D5',1],['G5',1],['D5',1],
      ['E5',.5],['D5',.5],['C5',1],['B4',1],['G4',1],
      ['A4',.5],['B4',.5],['C5',1],['A4',1],['D5',1],
      ['G5',1],['D5',1],['B4',1],['G4',1] ] },
    { type:'bass', gain:0.32, seq:[
      ['G2',1],['G2',1],['D3',1],['D3',1],['C3',1],['C3',1],['D3',1],['D3',1],
      ['G2',1],['G2',1],['C3',1],['C3',1],['G2',1],['D3',1],['G2',1],['G2',1] ] }
  ]},
  3:{ tempo:146, tracks:[
    { type:'mel', gain:0.30, seq:[
      ['E5',.5],['E5',.5],['G5',.5],['E5',.5],['C5',.5],['E5',.5],['G5',1],
      ['F5',.5],['E5',.5],['D5',.5],['E5',.5],['C5',1],['r',.5],['G4',.5],
      ['A4',.5],['C5',.5],['E5',.5],['G5',.5],['A5',.5],['G5',.5],['E5',.5],['C5',.5],
      ['D5',.5],['E5',.5],['F5',.5],['D5',.5],['C5',2] ] },
    { type:'bass', gain:0.32, seq:[
      ['C3',1],['G3',1],['C3',1],['G3',1],['F3',1],['C3',1],['G3',1],['G3',1],
      ['A3',1],['E3',1],['F3',1],['G3',1],['C3',1],['G3',1],['C3',2] ] },
    { type:'drum', gain:0, seq:[ ['x',1] ] }
  ]},
  4:{ tempo:164, tracks:[
    { type:'mel', gain:0.30, seq:[
      ['A4',.5],['A4',.5],['C5',.5],['A4',.5],['E5',.5],['A4',.5],['G5',1],
      ['F5',.5],['E5',.5],['D5',.5],['C5',.5],['B4',1],['E5',1],
      ['A4',.5],['C5',.5],['E5',.5],['A5',.5],['G5',.5],['F5',.5],['E5',1],
      ['D5',.5],['C5',.5],['B4',.5],['A4',.5],['A4',2] ] },
    { type:'bass', gain:0.34, seq:[
      ['A2',1],['A2',1],['F2',1],['F2',1],['G2',1],['G2',1],['E2',1],['E2',1],
      ['A2',1],['A2',1],['F2',1],['F2',1],['G2',1],['E2',1],['A2',2] ] },
    { type:'drum', gain:0, seq:[ ['x',.5] ] }
  ]},
  5:{ tempo:186, tracks:[
    { type:'mel', gain:0.30, seq:[
      ['E5',.5],['r',.5],['E5',.5],['F5',.5],['E5',.5],['D#5',.5],['E5',.5],['B4',.5],
      ['E5',.5],['G5',.5],['F#5',.5],['F5',.5],['E5',1],['r',1],
      ['A4',.5],['C5',.5],['E5',.5],['A5',.5],['G#5',.5],['G5',.5],['F#5',.5],['F5',.5],
      ['E5',.5],['D#5',.5],['E5',.5],['D#5',.5],['E5',2] ] },
    { type:'bass', gain:0.36, seq:[
      ['E2',.5],['E3',.5],['E2',.5],['E3',.5],['E2',.5],['E3',.5],['E2',.5],['E3',.5],
      ['A2',.5],['A3',.5],['A2',.5],['A3',.5],['G2',.5],['G3',.5],['G2',.5],['G3',.5] ] },
    { type:'drum', gain:0, seq:[ ['x',.5] ] }
  ]}
};

let bgm=null;
function startBGM(level){
  stopBGM();
  const def=BGMS[level];
  const spb=60/def.tempo;
  const start=audioCtx.currentTime+0.06;
  bgm={ def, spb, running:true, tracks:def.tracks.map(t=>({...t, idx:0, next:start})) };
  scheduleBGM();
}
function scheduleBGM(){
  if(!bgm||!bgm.running) return;
  const ahead=audioCtx.currentTime+0.18;
  bgm.tracks.forEach(tr=>{
    while(tr.next<ahead){
      const step=tr.seq[tr.idx];
      const dur=step[1]*bgm.spb;
      if(tr.type==='drum'){ if(step[0]==='x') playDrum(tr.next); }
      else if(step[0]!=='r'){ playNote(tr.type, NOTES[step[0]], tr.next, dur*0.92, tr.gain); }
      tr.next += dur;
      tr.idx = (tr.idx+1) % tr.seq.length;
    }
  });
  bgm.timer=setTimeout(scheduleBGM, 45);
}
function stopBGM(){ if(bgm){ bgm.running=false; clearTimeout(bgm.timer); bgm=null; } }

/* ===================== こうかおん ===================== */
function sfxBeep(ratio){                               // がけっぷち警告「ピピッ」
  if(!audioCtx) return; const t=audioCtx.currentTime;
  const freq=1000+ratio*600;                           // 危ないほど高い音
  const o=audioCtx.createOscillator(), g=audioCtx.createGain();
  o.type='square'; o.frequency.setValueAtTime(freq,t);
  g.gain.setValueAtTime(0.0001,t);
  g.gain.linearRampToValueAtTime(0.22,t+0.005);
  g.gain.exponentialRampToValueAtTime(0.0001,t+0.07);
  o.connect(g); g.connect(masterGain); o.start(t); o.stop(t+0.09);
}
function sfxDokan(){                                  // しっぱい「ドカン！」
  if(!audioCtx) return; const t=audioCtx.currentTime;
  const len=Math.floor(audioCtx.sampleRate*0.5);
  const buf=audioCtx.createBuffer(1,len,audioCtx.sampleRate);
  const d=buf.getChannelData(0);
  for(let i=0;i<len;i++) d[i]=(Math.random()*2-1)*Math.pow(1-i/len,1.4);
  const src=audioCtx.createBufferSource(); src.buffer=buf;
  const f=audioCtx.createBiquadFilter(); f.type='lowpass';
  f.frequency.setValueAtTime(1900,t); f.frequency.exponentialRampToValueAtTime(140,t+0.45);
  const g=audioCtx.createGain(); g.gain.setValueAtTime(0.9,t); g.gain.exponentialRampToValueAtTime(0.001,t+0.5);
  src.connect(f); f.connect(g); g.connect(masterGain); src.start(t);
  const o=audioCtx.createOscillator(), og=audioCtx.createGain();
  o.type='sine'; o.frequency.setValueAtTime(170,t); o.frequency.exponentialRampToValueAtTime(38,t+0.4);
  og.gain.setValueAtTime(0.8,t); og.gain.exponentialRampToValueAtTime(0.001,t+0.46);
  o.connect(og); og.connect(masterGain); o.start(t); o.stop(t+0.5);
}
function sfxFanfare(){                                 // せいこう ファンファーレ
  if(!audioCtx) return; const t=audioCtx.currentTime;
  [['G4',0],['C5',.12],['E5',.24],['G5',.36],['C6',.5,.5]].forEach(([n,dt,extra])=>{
    const s=t+dt, dur=extra?0.5:0.18;
    playNote('mel', NOTES[n], s, dur, 0.4);
    playNote('bass', NOTES[n]/2, s, dur, 0.22);
  });
}
function sfxStar(){                                    // スター 超ごうかファンファーレ
  if(!audioCtx) return; const t=audioCtx.currentTime;
  const mel=[['C5',0],['E5',.1],['G5',.2],['C6',.3],['E6',.42],['D6',.56],['E6',.68],['G6',.84,.9]];
  mel.forEach(([n,dt,hold])=>{
    const s=t+dt, dur=hold?0.9:0.16;
    playNote('mel', NOTES[n], s, dur, 0.38);
    playNote('bass', NOTES[n]/2, s, dur, 0.22);
    playNote('mel', NOTES[n]*1.5, s, dur, 0.12);   // 5度ハモリ
  });
  // キラキラ
  for(let i=0;i<6;i++){
    const s=t+0.9+i*0.08;
    const o=audioCtx.createOscillator(), g=audioCtx.createGain();
    o.type='triangle'; o.frequency.value=NOTES['C6']*Math.pow(2,i/12);
    g.gain.setValueAtTime(0.0001,s); g.gain.linearRampToValueAtTime(0.18,s+0.01); g.gain.exponentialRampToValueAtTime(0.0001,s+0.2);
    o.connect(g); g.connect(masterGain); o.start(s); o.stop(s+0.22);
  }
}

/* =========================================================================
   センサー（DeviceOrientation）
   ========================================================================= */
function onOrientation(e){
  if(e.beta==null && e.gamma==null) return;
  State.sensorSeen=true;
  State.curBeta = e.beta||0;
  State.curGamma = e.gamma||0;
  if(State.calibrating){ State.baseBeta=State.curBeta; State.baseGamma=State.curGamma; }
}
function requestSensor(){
  // iOS 13+ は許可が必要（ボタンタップの中で呼ぶこと）
  if(typeof DeviceOrientationEvent!=='undefined' &&
     typeof DeviceOrientationEvent.requestPermission==='function'){
    DeviceOrientationEvent.requestPermission()
      .then(res=>{ if(res==='granted') window.addEventListener('deviceorientation', onOrientation); })
      .catch(()=>{});
  } else if(window.DeviceOrientationEvent){
    window.addEventListener('deviceorientation', onOrientation);
  }
}

/* センサーが無いとき（PC等）のための ゆび操作フォールバック */
function setupPointerFallback(){
  const tray=document.querySelector('#game .tray-area');
  tray.addEventListener('pointermove', ev=>{
    if(State.sensorSeen) return;        // センサーがあれば使わない
    State.pointerCtrl=true;
    const r=tray.getBoundingClientRect();
    const nx=((ev.clientX-r.left)/r.width-0.5);
    const ny=((ev.clientY-r.top)/r.height-0.5);
    State.curGamma = nx*60; State.curBeta = ny*60;
    if(State.calibrating){ State.baseGamma=State.curGamma; State.baseBeta=State.curBeta; }
  });
}

function countdown(){
  const cd=byId('countdown'), num=byId('cdNum');
  cd.classList.remove('hidden');
  const seq=['3','2','1','スタート！'];
  let i=0;
  num.textContent=seq[0]; num.style.animation='none'; void num.offsetWidth; num.style.animation='';
  const tick=()=>{
    i++;
    if(i<seq.length){
      num.textContent=seq[i];
      num.style.animation='none'; void num.offsetWidth; num.style.animation='';
      setTimeout(tick,650);
    } else {
      cd.classList.add('hidden');
      State.calibrating=false;       // ここまでの構えを「たいら」として確定
      State.active=true;
      goalBtn.disabled=false;

      speak(byId('coin'), PLAY_LINES[Math.floor(Math.random()*PLAY_LINES.length)], 1600);
      scheduleEnemy();   // 敵モードなら 攻撃スタート
    }
  };
  setTimeout(tick,650);
}

/* 傾き → 画面上の左右(tiltX)・前後(tiltY) を計算（ゲームとテストで共通）*/
function computeTilt(){
  let dBeta  = State.curBeta  - State.baseBeta;
  let dGamma = State.curGamma - State.baseGamma;
  const landscape = (window.matchMedia && window.matchMedia('(orientation: landscape)').matches)
                    || (window.innerWidth >= window.innerHeight);
  let o = (typeof window.orientation === 'number') ? window.orientation
          : (screen.orientation && typeof screen.orientation.angle==='number' ? screen.orientation.angle : 90);
  let tiltX, tiltY;
  if(landscape){
    if(o === -90 || o === 270){ tiltX = -dBeta;  tiltY =  dGamma; }
    else                      { tiltX =  dBeta;  tiltY = -dGamma; }
  } else {
    if(o === 180){ tiltX = -dGamma; tiltY = -dBeta; }
    else         { tiltX =  dGamma; tiltY =  dBeta; }
  }
  if(TILT.invertX) tiltX = -tiltX;
  if(TILT.invertY) tiltY = -tiltY;
  return { tiltX: clamp(tiltX,-45,45), tiltY: clamp(tiltY,-45,45) };
}

/* メインループ：傾き → コインの動き（慣性つき） */
function loop(now){
  State.raf=requestAnimationFrame(loop);
  let dt=(now-State.last)/1000; State.last=now;
  if(dt>0.05) dt=0.05;

  if(State.active){
    const t = computeTilt();
    const k=CONFIG[State.level];
    const G=k.sens;
    // 加速度（坂の傾き ∝ sin）：コインは「下り坂」の向きへ転がる
    State.vx += Math.sin(t.tiltX*Math.PI/180)*G*dt;
    State.vy += Math.sin(t.tiltY*Math.PI/180)*G*dt;
    State.vx *= k.damp; State.vy *= k.damp;
    State.x += State.vx*dt; State.y += State.vy*dt;

    const dist=Math.max(Math.abs(State.x),Math.abs(State.y));   // 四角いトレイの ふちまでの きょり
    coinEl.style.transform='translate('+State.x+'px,'+State.y+'px)';
    // うごいた あとに 光のあとが のこる
    if(State.active && now-(State._lt||0)>80 && (Math.abs(State.vx)+Math.abs(State.vy))>0.15){
      State._lt=now;
      const td=document.createElement('div'); td.className='traildot';
      td.style.transform='translate('+State.x+'px,'+State.y+'px)';
      coinEl.parentElement.appendChild(td);
      setTimeout(()=>td.remove(), 620);
    }

    // ふちが近づくと赤く光る
    const ratio=clamp(dist/State.maxR,0,1);
    dangerEl.style.boxShadow='inset 0 0 '+(ratio*4)+'vh '+(ratio*1.2)+'vh rgba(255,40,40,'+(ratio*0.9)+')';

    // ★がけっぷち警報（赤いドクドク＋ピピッ音）
    updateDanger(ratio, now);

    if(dist>State.maxR){ fail(); }
  }
}
function clamp(v,a,b){ return v<a?a:(v>b?b:v); }

/* がけっぷち警報：危険度に応じて 画面を赤くドクドク＆音を速める */
function updateDanger(ratio, now){
  const ALERT = 0.55;                      // ここを超えると警報スタート
  const rp=byId('rosePlay');
  if(ratio < ALERT){
    if(dangerVig.style.opacity!=='0'){ dangerVig.style.opacity='0'; dangerTxt.classList.remove('on'); }
    State.lastBeep = 0;
    if(State._roseWorry){ State._roseWorry=false; setFace(rp,'happy'); }
    return;
  }
  if(!State._roseWorry){ State._roseWorry=true; setFace(rp,'worry'); }   // バラリンが心配顔に
  const d = (ratio - ALERT) / (1 - ALERT);          // 0〜1 の危険度
  // 心臓のドクドク（危険なほど速く・強く）
  const period = 520 - d*360;                       // 拍の間隔(ms)：危険ほど短い
  const beat = 0.5 + 0.5*Math.sin(now/period*Math.PI*2);
  dangerVig.style.opacity = (0.25 + d*0.65) * (0.4 + 0.6*beat);
  // 「あぶない！」テキスト（かなり危ないとき）
  if(d>0.55) dangerTxt.classList.add('on'); else dangerTxt.classList.remove('on');
  // ピピッ音（危険なほど速い）
  const interval = 520 - d*400;                     // 音の間隔(ms)
  if(!State.lastBeep || now - State.lastBeep > interval){
    sfxBeep(d);
    State.lastBeep = now;
  }
}
function clearDanger(){
  if(dangerVig) dangerVig.style.opacity='0';
  if(dangerTxt) dangerTxt.classList.remove('on');
  State.lastBeep = 0;
}

  State.ended=true; State.active=false; goalBtn.disabled=true;
  clearDanger();
  stopEnemy();
  sfxDokan();
  const ff=byId('failFlash'); ff.classList.remove('on'); void ff.offsetWidth; ff.classList.add('on');
  coinEl.classList.add('fall');

}

function showRoundResult(ok){
  const rr=byId('roseRound');
  setFace(rr, ok?'cheer':'sad');
  if(ok){ roseJump(rr); makePetals(byId('petalbox'), 28); }
  speak(rr, ok?'やったね！🌸':'ドンマイ！ つぎ いこう！', 2400);
  const msg=byId('rrMsg'), sub=byId('rrSub');
  if(ok){ msg.textContent='せいこう！'; msg.className='rr-msg ok'; sub.textContent='コインを おとさず あるけたね！'; }
  else  { msg.textContent='おっとっと！'; msg.className='rr-msg ng'; sub.textContent='だいじょうぶ、つぎ がんばろう！'; }
  msg.classList.remove('stamp'); void msg.offsetWidth; msg.classList.add('stamp');   // スタンプ風に ドン！
  if(ok){ makeStarBurst(byId('roundResult'), 14); }                                   // 星が はじける

  const nb=byId('nextBtn');
  if(State.play < TOTAL_PLAYS){ nb.textContent='つぎへ（'+(State.play+1)+'かいめ）'; }
  else { nb.textContent='けっかを みる →'; }

  byId('roundResult').classList.remove('hidden');
}

byId('nextBtn').addEventListener('click', ()=>{

  else { showFinal(); }
});

   ========================================================================= */
function showFinal(){
  stopBGM();
  State.active=false;
  const clears=State.clears;
  const rate=Math.round(clears/TOTAL_PLAYS*100);

  byId('finalHeadline').textContent = TOTAL_PLAYS+'かいちゅう '+clears+'かい くりあ！';
  const rateEl=byId('finalRate'); countUpRate(rateEl, rate);   // 0→成功率まで カウントアップ

  const star=byId('finalStar'), praise=byId('finalPraise'), nudge=byId('finalNudge');
  const rf=byId('roseFinal');
  clearConfetti();

  if(rate>=80){
    star.classList.remove('hidden');
    praise.textContent='すごい！ だいせいこう！';
    praise.className='final-praise big';
    nudge.textContent='バランス めいじん だね ⭐';
    setFace(rf,'cheer'); roseJump(rf);
    makeConfetti();
    show('final');
    sfxStar();
    makeStarBurst(byId('final'), 18);   // 星が はじける！
    speak(rf, 'すごい！ やったね！🌟', 3000);
  } else {
    star.classList.add('hidden');
    praise.textContent='よく がんばったね！';
    praise.className='final-praise warm';
    nudge.textContent='つぎは ８０％ を めざそう！';
    setFace(rf,'happy');
    show('final');
    sfxFanfare();
    speak(rf, 'よく がんばったね！', 3000);
  }
}

/* ===== バラリンが しゃべる（ふきだし＋8bitもごもごボイス＋口パク） ===== */
function blipVoice(text){
  if(!audioCtx) return;
  const t0=audioCtx.currentTime; let n=0;
  for(let i=0;i<text.length;i++){
    const ch=text[i];
    if(ch===' '||ch==='　'||ch==='\n'||ch==='！'||ch==='、'||ch==='。'||ch==='〜') continue;
    const t=t0 + n*0.085; n++;
    if(n>20) break;
    const o=audioCtx.createOscillator(), g=audioCtx.createGain();
    o.type='triangle';
    o.frequency.value = 420 + ((i*5)%5)*60;        // 音程を少し変えて しゃべってる感
    g.gain.setValueAtTime(0.0001,t);
    g.gain.linearRampToValueAtTime(0.15,t+0.008);
    g.gain.exponentialRampToValueAtTime(0.0001,t+0.07);
    o.connect(g); g.connect(masterGain); o.start(t); o.stop(t+0.09);
  }
}
function speak(target, text, ms){
  if(!target) return;
  const b=byId('bubble');
  // 前のしゃべりを片づける
  if(speakTarget) speakTarget.classList.remove('talking');
  clearTimeout(speakTimer);
  b.textContent=text; b.classList.add('show');
  // ふきだしの位置（キャラの上、はみ出すなら下）
  const r=target.getBoundingClientRect();
  const bw=b.offsetWidth, bh=b.offsetHeight;
  let left=r.left + r.width/2 - bw/2;
  let top=r.top - bh - 14;
  if(top<8){ top=r.bottom + 14; }
  left=Math.max(8, Math.min(left, window.innerWidth-bw-8));
  b.style.left=left+'px'; b.style.top=top+'px';
  // 口パク＋ボイス
  target.classList.add('talking'); speakTarget=target;
  blipVoice(text);
  const dur = ms || Math.min(2800, 800 + text.length*130);
  speakTimer=setTimeout(()=>{
    b.classList.remove('show');
    target.classList.remove('talking');
    if(speakTarget===target) speakTarget=null;
  }, dur);
}
function hideBubble(){
  const b=byId('bubble'); if(b) b.classList.remove('show');
  if(speakTarget){ speakTarget.classList.remove('talking'); speakTarget=null; }
  clearTimeout(speakTimer);
}

/* 敵キャラを 右の土管の上に 出す（プレイ中ずっと） */
function mountEnemy(level){
  const ec=byId('enemyChar'); const cfg=ENEMY[level];
  ec.className='enemy enemy-char '+cfg.boss;
  ec.style.setProperty('--s', cfg.size+'vh');
  ec.innerHTML = enemyHTML(cfg.boss);
  ec.style.right='1.5vh'; ec.style.left='auto'; ec.style.bottom='30vh'; ec.style.top='auto';
  void ec.offsetWidth; ec.classList.add('in');     // ふわっと表示（ずっと いる）
}
function hideEnemyChar(){ const ec=byId('enemyChar'); if(ec){ ec.classList.remove('in','attacking','windup'); } }
function lungeEnemy(){ const ec=byId('enemyChar'); if(!ec) return; ec.classList.remove('attacking'); void ec.offsetWidth; ec.classList.add('attacking'); setTimeout(()=>ec.classList.remove('attacking'),600); }

/* 攻撃エフェクトを 出す */
function doAttack(cfg){
  const layer=byId('enemyLayer'); if(!layer) return;
  lungeEnemy();                                 // ずっといる敵が ぐいっと乗り出す
  const D=(cfg.dur/1000)+'s';
  const W=window.innerWidth, H=window.innerHeight, vh=H/100;
  const cx=W/2, cy=H*0.52;                     // おぼんの中心あたり
  const add=(cls, style)=>{ const e=document.createElement('div'); e.className=cls; e.style.cssText='--d:'+D+';'+(style||''); layer.appendChild(e);
    setTimeout(()=>{ if(e.parentNode) e.parentNode.removeChild(e); }, cfg.dur+150); };

  if(cfg.atk==='cloud'){ add('atk-cloud','top:'+(cy-12*vh)+'px;'); }
  else if(cfg.atk==='fly'){
    for(let i=0;i<6;i++) add('atk-leaf','top:'+(28+Math.random()*40)+'%; animation-delay:'+(i*0.12)+'s;');
  }
  else if(cfg.atk==='ink'){          // 18vh×16vh のシミを 中心付近に3つ
    for(let i=0;i<3;i++){ const ox=(Math.random()-0.5)*16*vh, oy=(Math.random()-0.5)*16*vh;
      add('atk-ink','left:'+(cx-9*vh+ox)+'px; top:'+(cy-8*vh+oy)+'px; animation-delay:'+(i*0.18)+'s;'); }
  }
  else if(cfg.atk==='smoke'){         // 26vh のけむりを 中心付近に3つ
    for(let i=0;i<3;i++){ const ox=(Math.random()-0.5)*18*vh, oy=(Math.random()-0.5)*14*vh;
      add('atk-smoke','left:'+(cx-13*vh+ox)+'px; top:'+(cy-13*vh+oy)+'px; animation-delay:'+(i*0.22)+'s;'); }
  }
  else if(cfg.atk==='dark'){ add('atk-dark'); add('atk-mist','top:24%;'); }
  if(cfg.line) speak(byId('enemyChar'), cfg.line, 1400);
}

/* スケジュール（ラウンド中だけ くりかえし攻撃） */
function scheduleEnemy(){
  if(!State.enemyMode || !State.active || State.ended) return;
  const cfg=ENEMY[State.level];
  State.enemyTimer=setTimeout(()=>{
    if(!(State.enemyMode && State.active && !State.ended)) return;
    // ためポーズ（ぷるぷる しゃがむ）→ 0.5秒後に 攻撃！
    const ec=byId('enemyChar');
    if(ec){ ec.classList.remove('windup'); void ec.offsetWidth; ec.classList.add('windup'); }
    State.enemyTimer=setTimeout(()=>{
      if(State.enemyMode && State.active && !State.ended){ doAttack(cfg); shakeGame(); scheduleEnemy(); }
    }, 520);
  }, cfg.interval);
}
function stopEnemy(){
  clearTimeout(State.enemyTimer);
  const layer=byId('enemyLayer'); if(layer) layer.innerHTML='';
  hideEnemyChar();
}

/* モード切替ボタン */
try{ if(localStorage.getItem('enemyMode')==='1') State.enemyMode=true; }catch(e){}
function refreshMode(){
  byId('modeNormal').classList.toggle('on', !State.enemyMode);
  byId('modeEnemy').classList.toggle('on', State.enemyMode);
}
refreshMode();
byId('modeNormal').addEventListener('click', ()=>{ State.enemyMode=false; refreshMode(); try{localStorage.setItem('enemyMode','0');}catch(e){} });
byId('modeEnemy').addEventListener('click', ()=>{ State.enemyMode=true; refreshMode(); try{localStorage.setItem('enemyMode','1');}catch(e){} });

/* タイトルの敵パレード（5体ならべて強さの階段を見せる） */
(function(){
  const row=byId('epRow'); if(!row) return;
  const sizes={b1:5.5,b2:6.5,b3:7.5,b4:8.5,b5:10};
  ['b1','b2','b3','b4','b5'].forEach((b,i)=>{
    const d=document.createElement('div');
    d.className='enemy '+b;
    d.style.setProperty('--s', sizes[b]+'vh');
    d.innerHTML=enemyHTML(b);
    const mb=d.querySelector('.m-body'); if(mb) mb.style.animationDelay=(i*0.25)+'s';
    row.appendChild(d);
  });
})();
/* 星がはじけるバースト */
function makeStarBurst(container,n){
  if(!container) return;
  const cols=['#ffd21a','#ff8ad0','#7fd0f4','#ffe874'];
  for(let i=0;i<n;i++){
    const s=document.createElement('span');
    s.className='bstar'; s.textContent='★';
    const ang=Math.random()*Math.PI*2, dist=14+Math.random()*18;
    s.style.setProperty('--tx', (Math.cos(ang)*dist)+'vh');
    s.style.setProperty('--ty', (Math.sin(ang)*dist*0.7)+'vh');
    s.style.color=cols[i%cols.length];
    s.style.fontSize=(2.2+Math.random()*1.8)+'vh';
    s.style.animationDelay=(Math.random()*0.15)+'s';
    container.appendChild(s);
    setTimeout(()=>s.remove(), 1200);
  }
}
/* 成功率のカウントアップ */
function countUpRate(el, target){
  let v=0; const step=Math.max(1, Math.round(target/26));
  const iv=setInterval(()=>{
    v+=step; if(v>=target){ v=target; clearInterval(iv); }
    el.innerHTML=v+'<span class="pct">％</span>';
  }, 30);
}
/* 攻撃時に画面を小さくゆらす */
function shakeGame(){
  const g=byId('game'); if(!g) return;
  g.classList.remove('shakeS'); void g.offsetWidth; g.classList.add('shakeS');
  setTimeout(()=>g.classList.remove('shakeS'), 350);
}

/* ===== 向き調整ボタン（押すと左右/前後の向きを反転、設定は記憶） ===== */
try{
  if(localStorage.getItem('tiltInvertX')==='1') TILT.invertX=true;
  if(localStorage.getItem('tiltInvertY')==='1') TILT.invertY=true;
}catch(e){}
const tfixX=byId('tfixX'), tfixY=byId('tfixY');
function refreshTfix(){
  tfixX.classList.toggle('on', TILT.invertX);
  tfixY.classList.toggle('on', TILT.invertY);
}
refreshTfix();
tfixX.addEventListener('click', ()=>{
  TILT.invertX=!TILT.invertX; refreshTfix();
  try{ localStorage.setItem('tiltInvertX', TILT.invertX?'1':'0'); }catch(e){}
});
tfixY.addEventListener('click', ()=>{
  TILT.invertY=!TILT.invertY; refreshTfix();
  try{ localStorage.setItem('tiltInvertY', TILT.invertY?'1':'0'); }catch(e){}
});

/* =========================================================================
   かたむきテストモード
   ========================================================================= */
const testCoin=byId('testCoin'), testTrayEl=document.querySelector('#test .tray-test');

function calibrateNow(){           // いまの構えを「たいら」にする
  State.calibrating=true;
  setTimeout(()=>{ State.calibrating=false; }, 700);
}
function enterTest(){
  hideBubble();
  initAudio(); resumeAudio();
  requestSensor();
  show('test');
  State.testOn=true;
  State.tx=State.ty=State.tvx=State.tvy=0;
  testCoin.style.transform='translate(0px,0px)';
  const rect=testTrayEl.getBoundingClientRect();
  const coinR=testCoin.getBoundingClientRect().width/2;
  State.testMaxR=(rect.width/2 - coinR);
  calibrateNow();
  State.testLast=performance.now();
  if(!State.testRaf) testLoop(performance.now());
}
function exitTest(){
  State.testOn=false;
  if(State.testRaf){ cancelAnimationFrame(State.testRaf); State.testRaf=null; }
  show('title');
  greetTitle();
}
function testLoop(now){
  if(!State.testOn){ State.testRaf=null; return; }
  State.testRaf=requestAnimationFrame(testLoop);
  let dt=(now-State.testLast)/1000; State.testLast=now; if(dt>0.05) dt=0.05;
  const t=computeTilt();
  const G=2400;                    // テスト用の すべりやすさ（ふつう程度）
  State.tvx += Math.sin(t.tiltX*Math.PI/180)*G*dt;
  State.tvy += Math.sin(t.tiltY*Math.PI/180)*G*dt;
  State.tvx*=0.95; State.tvy*=0.95;
  State.tx += State.tvx*dt; State.ty += State.tvy*dt;
  const r=Math.hypot(State.tx,State.ty);
  if(r>State.testMaxR && r>0){      // テストでは落ちず、ふちで止まる
    const s=State.testMaxR/r; State.tx*=s; State.ty*=s; State.tvx*=0.4; State.tvy*=0.4;
  }
  testCoin.style.transform='translate('+State.tx+'px,'+State.ty+'px)';
}

byId('testEnterBtn').addEventListener('click', enterTest);
byId('testOkBtn').addEventListener('click', exitTest);
byId('testResetBtn').addEventListener('click', calibrateNow);
</script>
